<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Transcribe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3e;
    --text: #e4e4f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,0.3);
    --green: #00d68f;
    --yellow: #ffb347;
    --red: #ff6b6b;
    --radius: 12px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  .container { width: 100%; max-width: 640px; }

  header { text-align: center; margin-bottom: 40px; }
  header h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group select {
    width: 100%; padding: 12px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    outline: none; transition: border 0.2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .form-group select option { background: var(--surface2); }

  .row { display: flex; gap: 12px; }
  .row .form-group { flex: 1; }

  button {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    border: none; border-radius: 8px; color: #fff;
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .steps { margin-top: 24px; }

  .step {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    opacity: 0.3; transition: opacity 0.4s;
  }
  .step:last-child { border-bottom: none; }
  .step.active { opacity: 1; }
  .step.done { opacity: 0.7; }
  .step.error { opacity: 1; }

  .step-icon {
    width: 32px; height: 32px; min-width: 32px;
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 14px; font-weight: 700;
    background: var(--surface2); border: 2px solid var(--border);
    transition: all 0.3s;
  }
  .step.active .step-icon {
    border-color: var(--accent); background: var(--accent);
    animation: pulse 1.5s infinite;
  }
  .step.done .step-icon {
    border-color: var(--green); background: var(--green);
  }
  .step.error .step-icon {
    border-color: var(--red); background: var(--red);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 8px transparent; }
  }

  .step-content { flex: 1; min-width: 0; }
  .step-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .step-message { font-size: 13px; color: var(--text-dim); }
  .step-bar {
    margin-top: 8px; height: 3px; border-radius: 2px;
    background: var(--surface2); overflow: hidden;
  }
  .step-bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), #a29bfe);
    width: 0%; transition: width 0.3s;
  }

  .result-card {
    display: none; text-align: center; padding: 32px;
  }
  .result-card.visible { display: block; }
  .result-card .check {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--green); display: flex; align-items: center;
    justify-content: center; margin: 0 auto 16px; font-size: 28px;
  }
  .result-card h2 { font-size: 20px; margin-bottom: 8px; }
  .result-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
  .download-btn {
    display: inline-block; padding: 14px 32px;
    background: var(--green); color: #000; font-weight: 700;
    border-radius: 8px; text-decoration: none; font-size: 15px;
    transition: opacity 0.2s;
  }
  .download-btn:hover { opacity: 0.85; }

  .error-msg {
    color: var(--red); font-size: 13px; margin-top: 12px;
    display: none; padding: 12px; background: rgba(255,107,107,0.1);
    border-radius: 8px; border: 1px solid rgba(255,107,107,0.2);
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>YT Transcribe</h1>
    <p>Descarcă, transcrie și traduce videoclipuri YouTube</p>
  </header>

  <div class="card" id="input-card">
    <div class="form-group">
      <label>Link YouTube</label>
      <input type="url" id="url-input" placeholder="https://youtube.com/watch?v=..." autofocus>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Tradu în</label>
        <select id="lang-select">
          <option value="ro">Română</option>
          <option value="en">Engleză</option>
          <option value="fr">Franceză</option>
          <option value="de">Germană</option>
          <option value="es">Spaniolă</option>
          <option value="it">Italiană</option>
          <option value="pt">Portugheză</option>
          <option value="nl">Olandeză</option>
          <option value="ru">Rusă</option>
        </select>
      </div>
    </div>
    <button id="start-btn" onclick="start()">Pornește</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="card" id="progress-card" style="display:none">
    <div class="steps" id="steps">
      <div class="step" id="step-extract">
        <div class="step-icon">1</div>
        <div class="step-content">
          <div class="step-title">Extragere informații</div>
          <div class="step-message" id="msg-extract">Se preiau detaliile videoclipului...</div>
          <div class="step-bar"><div class="step-bar-fill" id="bar-extract"></div></div>
        </div>
      </div>
      <div class="step" id="step-content">
        <div class="step-icon">2</div>
        <div class="step-content">
          <div class="step-title" id="title-content">Subtitrări / Transcriere</div>
          <div class="step-message" id="msg-content">Se verifică...</div>
          <div class="step-bar"><div class="step-bar-fill" id="bar-content"></div></div>
        </div>
      </div>
      <div class="step" id="step-translate">
        <div class="step-icon">3</div>
        <div class="step-content">
          <div class="step-title">Traducere</div>
          <div class="step-message" id="msg-translate">În așteptare...</div>
          <div class="step-bar"><div class="step-bar-fill" id="bar-translate"></div></div>
        </div>
      </div>
      <div class="step" id="step-download">
        <div class="step-icon">4</div>
        <div class="step-content">
          <div class="step-title">Video</div>
          <div class="step-message" id="msg-download">În așteptare...</div>
          <div class="step-bar"><div class="step-bar-fill" id="bar-download"></div></div>
        </div>
      </div>
    </div>
    <button id="cancel-btn" onclick="cancelTask()" style="margin-top:16px;background:linear-gradient(135deg,var(--red),#ff8e8e)">Anulează</button>
  </div>

  <div class="card result-card" id="result-card">
    <div class="check">&#10003;</div>
    <h2>Finalizat!</h2>
    <p id="result-msg">Videoclipul cu subtitrări traduse este gata.</p>
    <a class="download-btn" id="download-link" href="#">Descarcă Video</a>
    <br><br>
    <button onclick="resetAll()" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:14px;padding:10px">Tradu alt videoclip</button>
  </div>
</div>

<script>
let taskId = null;
let eventSource = null;

function start() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { showError('Introdu un link YouTube'); return; }
  hideError();
  document.getElementById('input-card').style.display = 'none';
  document.getElementById('progress-card').style.display = 'block';
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('cancel-btn').disabled = false;
  document.getElementById('cancel-btn').textContent = 'Anulează';
  resetSteps();
  activateStep('extract');

  const lang = document.getElementById('lang-select').value;

  fetch(`/start?url=${encodeURIComponent(url)}&target_lang=${encodeURIComponent(lang)}`, { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      taskId = data.task_id;
      eventSource = new EventSource(`/progress/${taskId}`);
      eventSource.addEventListener('progress', e => {
        const data = JSON.parse(e.data);
        if (data.step === 'cancelled') {
          if (eventSource) { eventSource.close(); eventSource = null; }
          showError('Proces anulat');
          return;
        }
        handleProgress(data);
      });
      eventSource.onerror = () => {
        if (eventSource) { eventSource.close(); eventSource = null; }
      };
    })
    .catch(err => showError(err.message));
}

// Auto-cancel when leaving the page
window.addEventListener('beforeunload', () => {
  if (taskId) {
    navigator.sendBeacon(`/cancel/${taskId}`, '');
  }
});

function handleProgress(data) {
  const { step, message, progress, status } = data;
  if (step === 'content') {
    const titleEl = document.getElementById('title-content');
    if (titleEl) {
      if (message.includes('Subtitrări')) titleEl.textContent = 'Subtitrări';
      else if (message.includes('transcrie')) titleEl.textContent = 'Transcriere';
    }
  }
  if (step === 'error') { showError(message); return; }
  if (step === 'done') {
    completeAll();
    const info = JSON.parse(message);
    document.getElementById('result-msg').textContent = `Videoclip gata: ${info.file}`;
    document.getElementById('download-link').href = `/download/${encodeURIComponent(info.stem)}`;
    document.getElementById('result-card').classList.add('visible');
    if (eventSource) { eventSource.close(); eventSource = null; }
    return;
  }
  setStepMessage(step, message);
  setStepProgress(step, progress);
  if (status === 'done') {
    markDone(step);
  } else if (status === 'skipped') {
    markSkipped(step, message);
  } else {
    activateStep(step);
  }
}

function activateStep(step) {
  document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`step-${step}`);
  if (el) el.classList.add('active');
}

function markDone(step) {
  const el = document.getElementById(`step-${step}`);
  if (el) { el.classList.remove('active'); el.classList.add('done'); }
}

function markSkipped(step, msg) {
  const el = document.getElementById(`step-${step}`);
  if (el) {
    el.classList.remove('active');
    el.classList.add('done');
    el.style.opacity = '0.5';
  }
  setStepProgress(step, 1);
}

function completeAll() {
  document.querySelectorAll('.step').forEach(el => {
    el.classList.remove('active');
    el.classList.add('done');
  });
}

function setStepMessage(step, msg) {
  const el = document.getElementById(`msg-${step}`);
  if (el) el.textContent = msg;
}

function setStepProgress(step, pct) {
  const el = document.getElementById(`bar-${step}`);
  if (el) el.style.width = `${Math.round(pct * 100)}%`;
}

function resetSteps() {
  document.querySelectorAll('.step').forEach(el => {
    el.classList.remove('active', 'done', 'error');
  });
  document.querySelectorAll('.step-bar-fill').forEach(el => el.style.width = '0%');
}

function cancelTask() {
  if (!taskId) return;
  fetch(`/cancel/${taskId}`, { method: 'POST' }).catch(() => {});
  document.getElementById('cancel-btn').disabled = true;
  document.getElementById('cancel-btn').textContent = 'Se anulează...';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
  document.getElementById('start-btn').disabled = false;
  document.getElementById('input-card').style.display = 'block';
  document.getElementById('progress-card').style.display = 'none';
}

function hideError() {
  document.getElementById('error-msg').classList.remove('visible');
}

function resetAll() {
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('progress-card').style.display = 'none';
  document.getElementById('input-card').style.display = 'block';
  document.getElementById('url-input').value = '';
  document.getElementById('start-btn').disabled = false;
  document.getElementById('title-content').textContent = 'Subtitrări / Transcriere';
  if (eventSource) { eventSource.close(); eventSource = null; }
}
</script>
</body>
</html>

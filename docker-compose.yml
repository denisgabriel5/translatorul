services:
  translatorul:
    image: ghcr.io/denisgabriel5/translatorul:latest
    # Uncomment to build locally instead of pulling the published image:
    # build: .
    container_name: translatorul
    # No `init: true` here -- the image's ENTRYPOINT already runs tini as PID 1.
    # Setting both would demote tini to a child process (the "Tini is not running
    # as PID 1" warning) and reaping would stop working.
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - models:/app/models
      - jobs:/app/jobs
    environment:
      # Translation model. Qwen2.5-14B Q8_0 (~16GB RAM) gives noticeably more
      # accurate Romanian than the 7B; drop to a Q4_K_M file (or the 7B) for
      # less RAM / faster inference. TRANSLATE_MODEL_REPO is the HF repo it's
      # downloaded from on first run.
      - TRANSLATE_MODEL_FILE=Qwen2.5-14B-Instruct-Q8_0.gguf
      - TRANSLATE_MODEL_REPO=bartowski/Qwen2.5-14B-Instruct-GGUF
      # faster-whisper transcription model + CPU compute type.
      # large-v3-turbo: near-large accuracy, much faster than large-v3 on CPU.
      # Drop to "small"/"medium" for faster (lower-quality) transcription.
      - WHISPER_MODEL=large-v3-turbo
      - WHISPER_COMPUTE_TYPE=int8
      # Run one job at a time on CPU-only hosts (Whisper + Qwen + ffmpeg
      # together use most of a 32GB machine's RAM).
      - MAX_CONCURRENT_JOBS=1

volumes:
  models:
  jobs:
